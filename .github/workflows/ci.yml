name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**", "fix/**"]

permissions:
  contents: read

jobs:
  test-lint-build:
    name: Test, lint, and build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]" --constraint requirements-dev.lock

      - name: Run tests
        run: pytest -q

      - name: Run ruff
        run: ruff check .

      - name: Build Docker image
        run: docker build -t github-unified-mcp-bff:test .
